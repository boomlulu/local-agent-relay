project_type: backend
pipeline_name: backend-basic

execute:
  adapter: claude-code
  timeout_seconds: 1800

validate:
  - name: git-diff-check
    adapter: git-diff-check
  - name: unit-tests
    adapter: shell-command
    command: pytest
  - name: service-health
    adapter: http-smoke-test
    url: http://localhost:8000/health
    expected_status: 200
  - name: log-error-scan
    adapter: log-error-scan
    input: ${ARTIFACT_DIR}/service.log

report:
  adapter: gemma-summary
  include:
    - executor_summary
    - changed_files
    - validation_logs
    - api_results

notify:
  - dashboard
  - macos
  - voice

